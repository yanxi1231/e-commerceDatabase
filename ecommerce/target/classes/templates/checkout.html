<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Checkout')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Checkout</h1>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

    <form id="checkoutForm" th:action="@{/checkout/place-order}" method="post">

        <div class="checkout-grid">
            <!-- Left: Address + Payment -->
            <div>
                <!-- Shipping Address -->
                <h2 style="margin-bottom:1rem;">Shipping Address</h2>

                <div th:if="${#lists.isEmpty(addresses)}" class="alert alert-error">
                    You need to add a shipping address before placing an order.
                </div>

                <div th:unless="${#lists.isEmpty(addresses)}">
                    <div th:each="addr, iterStat : ${addresses}" class="address-card"
                         th:classappend="${iterStat.first || addr.default} ? 'selected'"
                         th:onclick="'selectAddress(this, \'' + ${addr.id} + '\')'">
                        <div class="label" th:text="${addr.label}">Home</div>
                        <div class="details">
                            <span th:text="${addr.recipientName}">Name</span><br>
                            <span th:text="${addr.fullAddress}">Address</span>
                            <span th:if="${addr.phone}" th:text="' — ' + ${addr.phone}">Phone</span>
                        </div>
                    </div>
                </div>

                <input type="hidden" name="addressId" id="addressId"
                       th:value="${!#lists.isEmpty(addresses)} ? (${addresses[0].default} ? ${addresses[0].id} : ${addresses[0].id}) : ''">

                <!-- Add New Address (collapsible) -->
                <details style="margin-top:1rem; margin-bottom:1.5rem;">
                    <summary style="cursor:pointer; color:var(--primary); font-size:0.9rem;">+ Add new address</summary>
                    <div class="card" style="margin-top:0.75rem;">
                        <div class="card-body">
                            <div th:action="@{/checkout/add-address}" style="display:contents;">
                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                                    <div class="form-group">
                                        <label>Label</label>
                                        <input type="text" name="addrLabel" class="form-control" placeholder="Home" id="addrLabel">
                                    </div>
                                    <div class="form-group">
                                        <label>Recipient Name</label>
                                        <input type="text" name="addrRecipient" class="form-control" placeholder="Full name" id="addrRecipient">
                                    </div>
                                    <div class="form-group" style="grid-column:span 2;">
                                        <label>Street Address</label>
                                        <input type="text" name="addrStreet" class="form-control" placeholder="123 Main St" id="addrStreet">
                                    </div>
                                    <div class="form-group">
                                        <label>City</label>
                                        <input type="text" name="addrCity" class="form-control" placeholder="City" id="addrCity">
                                    </div>
                                    <div class="form-group">
                                        <label>State</label>
                                        <input type="text" name="addrState" class="form-control" placeholder="State" id="addrState">
                                    </div>
                                    <div class="form-group">
                                        <label>ZIP Code</label>
                                        <input type="text" name="addrZip" class="form-control" placeholder="12345" id="addrZip">
                                    </div>
                                    <div class="form-group">
                                        <label>Phone (optional)</label>
                                        <input type="text" name="addrPhone" class="form-control" placeholder="555-1234" id="addrPhone">
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline" style="margin-top:0.5rem;"
                                        onclick="addAddress()">Save Address</button>
                            </div>
                        </div>
                    </div>
                </details>

                <!-- Payment Method -->
                <h2 style="margin-bottom:1rem;">Payment Method</h2>
                <div class="form-group">
                    <select name="paymentMethod" class="form-control">
                        <option value="credit_card">Credit Card</option>
                        <option value="debit_card">Debit Card</option>
                        <option value="paypal">PayPal</option>
                        <option value="bank_transfer">Bank Transfer</option>
                    </select>
                </div>
                <p style="font-size:0.8rem; color:var(--gray-400); margin-top:0.5rem;">
                    This is a simulated payment. No real charges will be made.
                </p>
            </div>

            <!-- Right: Order Summary -->
            <div class="order-summary-box">
                <h3>Order Summary</h3>

                <div th:each="item : ${cartItems}" class="summary-line">
                    <span>
                        <span th:text="${item.product.name}">Product</span>
                        <span th:if="${item.variant != null}" style="font-size:0.8rem; color:var(--gray-400);"
                              th:text="' (' + ${item.variant.variantValue} + ')'"></span>
                        <span style="color:var(--gray-400);" th:text="' x' + ${item.quantity}">x1</span>
                    </span>
                    <span th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$0.00</span>
                </div>

                <div class="summary-line">
                    <span>Shipping</span>
                    <span style="color:var(--success);">Free</span>
                </div>

                <div class="summary-line total">
                    <span>Total</span>
                    <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}">$0.00</span>
                </div>

                <button type="submit" class="btn btn-success btn-block btn-lg" style="margin-top:1rem;"
                        th:disabled="${#lists.isEmpty(addresses)}"
                        onclick="return confirm('Place this order?')">
                    Place Order
                </button>

                <a th:href="@{/cart}" style="display:block; text-align:center; margin-top:0.75rem; font-size:0.9rem;">
                    &larr; Back to Cart
                </a>
            </div>
        </div>
    </form>
</div>

<script>
    function selectAddress(el, addrId) {
        document.querySelectorAll('.address-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('addressId').value = addrId;
    }

    // Initialize: select the first address or default
    document.addEventListener('DOMContentLoaded', function() {
        var selected = document.querySelector('.address-card.selected');
        if (selected) {
            var allCards = document.querySelectorAll('.address-card');
            // Find the default address
            allCards.forEach(function(card, idx) {
                if (card.classList.contains('selected')) {
                    card.click();
                }
            });
        }
    });

    function addAddress() {
        var form = document.createElement('form');
        form.method = 'post';
        form.action = '/checkout/add-address';

        var fields = {
            'label': document.getElementById('addrLabel').value || 'Home',
            'recipientName': document.getElementById('addrRecipient').value,
            'street': document.getElementById('addrStreet').value,
            'city': document.getElementById('addrCity').value,
            'state': document.getElementById('addrState').value,
            'zipCode': document.getElementById('addrZip').value,
            'phone': document.getElementById('addrPhone').value
        };

        if (!fields.recipientName || !fields.street || !fields.city || !fields.state || !fields.zipCode) {
            alert('Please fill in all required address fields');
            return;
        }

        // Add CSRF token
        var csrfMeta = document.querySelector('input[name="_csrf"]');
        if (csrfMeta) {
            var csrf = document.createElement('input');
            csrf.type = 'hidden';
            csrf.name = '_csrf';
            csrf.value = csrfMeta.value;
            form.appendChild(csrf);
        }

        for (var key in fields) {
            var input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = fields[key];
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
    }
</script>
</body>
</html>
