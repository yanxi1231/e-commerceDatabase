<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Shopping Cart')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Shopping Cart</h1>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

    <!-- Empty Cart -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="empty-state">
        <h2>Your cart is empty</h2>
        <p>Browse our products and add something you like!</p>
        <a th:href="@{/products}" class="btn btn-primary">Browse Products</a>
    </div>

    <!-- Cart with items -->
    <div th:unless="${#lists.isEmpty(cartItems)}">
        <div class="card">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td>
                            <div class="cart-item-info">
                                <img th:src="${item.product.primaryImageUrl}" th:alt="${item.product.name}">
                                <div>
                                    <div class="item-name">
                                        <a th:href="@{/products/{id}(id=${item.product.id})}"
                                           th:text="${item.product.name}">Product</a>
                                    </div>
                                    <div th:if="${item.variant != null}" class="item-variant"
                                         th:text="${item.variant.displayLabel}">Variant</div>
                                </div>
                            </div>
                        </td>
                        <td th:text="'$' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)}">$0.00</td>
                        <td>
                            <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post"
                                  style="display:flex; align-items:center; gap:0.5rem;">
                                <input type="number" name="quantity" th:value="${item.quantity}"
                                       min="1" max="99" class="form-control qty-input">
                                <button type="submit" class="btn btn-outline btn-sm">Update</button>
                            </form>
                        </td>
                        <td style="font-weight:600;"
                            th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}">$0.00</td>
                        <td>
                            <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Remove this item?')">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="cart-summary">
            <div class="cart-total">
                Total: <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}">$0.00</span>
            </div>
            <a th:href="@{/checkout}" class="btn btn-success btn-lg">Proceed to Checkout</a>
        </div>
    </div>
</div>
</body>
</html>
