<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="auth-container">
    <div class="auth-card">
        <h1>Create Account</h1>

        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control"
                       th:value="${name}" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       th:value="${email}" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="At least 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                       placeholder="Re-enter password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a th:href="@{/login}">Log in</a>
        </p>
    </div>
</div>
</body>
</html>
