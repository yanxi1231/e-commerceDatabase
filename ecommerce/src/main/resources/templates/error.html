<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="empty-state" style="padding-top:5rem;">
        <h2 style="font-size:3rem; color:var(--gray-300);" th:text="${statusCode} ?: '500'">500</h2>
        <h2 th:text="${errorMessage} ?: 'Something went wrong'">Error</h2>
        <p>We're sorry for the inconvenience.</p>
        <div style="margin-top:1.5rem; display:flex; gap:0.75rem; justify-content:center;">
            <a th:href="@{/products}" class="btn btn-primary">Go to Products</a>
            <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
        </div>
    </div>
</div>
</body>
</html>
