<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Orders')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>My Orders</h1>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
        <h2>No orders yet</h2>
        <p>Once you place an order, it will appear here.</p>
        <a th:href="@{/products}" class="btn btn-primary">Start Shopping</a>
    </div>

    <!-- Orders list -->
    <div th:unless="${#lists.isEmpty(orders)}">
        <a th:each="order : ${orders}" th:href="@{/orders/{id}(id=${order.id})}"
           class="order-card" style="text-decoration:none; color:inherit;">
            <div class="order-info">
                <h3>
                    Order <span style="font-family:monospace; color:var(--gray-500);"
                                th:text="${#strings.abbreviate(order.id, 12)}">ID</span>
                </h3>
                <div class="order-meta">
                    <span th:text="${#temporals.format(order.createdAt, 'MMM d, yyyy')}">Date</span>
                    &middot;
                    <span th:text="${#lists.size(order.items)} + ' item' + (${#lists.size(order.items)} > 1 ? 's' : '')">1 item</span>
                </div>
            </div>
            <div class="order-right">
                <div class="order-amount"
                     th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">$0.00</div>
                <span class="status-badge"
                      th:classappend="'status-' + ${order.status.name()}"
                      th:text="${order.statusDisplay}">Status</span>
            </div>
        </a>
    </div>
</div>
</body>
</html>
