<svg width="680" height="1580" viewBox="0 0 680 1580" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, Helvetica, sans-serif; background: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- SWIM LANE BACKGROUNDS -->
<rect x="40" y="0" width="300" height="1580" fill="#E6F1FB" opacity="0.4"/>
<rect x="340" y="0" width="300" height="1580" fill="#EAF3DE" opacity="0.4"/>

<!-- Swim lane headers -->
<rect x="40" y="0" width="300" height="32" fill="#185FA5"/>
<rect x="340" y="0" width="300" height="32" fill="#3B6D11"/>
<text x="190" y="21" text-anchor="middle" font-size="14" font-weight="600" fill="white">Customer</text>
<text x="490" y="21" text-anchor="middle" font-size="14" font-weight="600" fill="white">System</text>
<line x1="340" y1="32" x2="340" y2="1580" stroke="#999" stroke-width="0.5" stroke-dasharray="6 4"/>

<!-- UML INITIAL NODE -->
<circle cx="190" cy="58" r="10" fill="#333"/>
<line x1="190" y1="68" x2="190" y2="90" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- A1: Register / Login -->
<rect x="110" y="90" width="160" height="40" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="190" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Register / Login</text>
<line x1="190" y1="130" x2="190" y2="150" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="270" y1="110" x2="390" y2="110" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<rect x="390" y="90" width="180" height="40" rx="16" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.8"/>
<text x="480" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">Authenticate user</text>

<!-- D1: Valid? -->
<polygon points="190,150 250,178 190,206 130,178" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="190" y="182" text-anchor="middle" font-size="11" fill="#412402">Valid?</text>
<text x="116" y="172" font-size="11" fill="#854F0B" font-weight="600">No</text>
<path d="M130 178 L90 178 L90 110 L108 110" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="198" y="222" font-size="11" fill="#854F0B" font-weight="600">Yes</text>
<line x1="190" y1="206" x2="190" y2="240" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- A2: Browse / Search -->
<rect x="100" y="240" width="180" height="40" rx="16" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
<text x="190" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Browse / Search</text>
<line x1="190" y1="280" x2="190" y2="305" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="280" y1="260" x2="400" y2="260" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<rect x="400" y="240" width="180" height="40" rx="16" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.8"/>
<text x="490" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">Query products</text>

<!-- A3: View Product Details -->
<rect x="90" y="305" width="200" height="40" rx="16" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
<text x="190" y="329" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">View product details</text>
<line x1="190" y1="345" x2="190" y2="370" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- A4: Add to Cart -->
<rect x="110" y="370" width="160" height="40" rx="16" fill="#CECBF6" stroke="#534AB7" stroke-width="0.8"/>
<text x="190" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Add to cart</text>
<line x1="270" y1="390" x2="400" y2="390" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<rect x="400" y="370" width="180" height="40" rx="16" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.8"/>
<text x="490" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">Update cart DB</text>
<line x1="190" y1="410" x2="190" y2="435" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- D2: Continue shopping? -->
<polygon points="190,435 265,463 190,491 115,463" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="190" y="467" text-anchor="middle" font-size="11" fill="#412402">Continue?</text>
<text x="273" y="457" font-size="11" fill="#854F0B" font-weight="600">Yes</text>
<path d="M265 463 L310 463 L310 260 L282 260" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="198" y="508" font-size="11" fill="#854F0B" font-weight="600">No</text>
<line x1="190" y1="491" x2="190" y2="525" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- A5: View Cart -->
<rect x="110" y="525" width="160" height="40" rx="16" fill="#CECBF6" stroke="#534AB7" stroke-width="0.8"/>
<text x="190" y="549" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">View / Edit cart</text>
<line x1="190" y1="565" x2="190" y2="590" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- A6: Select Address -->
<rect x="95" y="590" width="190" height="40" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="190" y="614" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">Select ship address</text>
<line x1="190" y1="630" x2="190" y2="655" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- A7: Proceed to Checkout -->
<rect x="95" y="655" width="190" height="40" rx="16" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
<text x="190" y="679" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Proceed to checkout</text>
<line x1="285" y1="675" x2="380" y2="675" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- System: Reserve Stock (NOT decrement yet) -->
<rect x="380" y="655" width="210" height="40" rx="16" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
<text x="485" y="679" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Verify + Reserve stock</text>
<line x1="485" y1="695" x2="485" y2="720" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- D3: Stock available? -->
<polygon points="485,720 555,748 485,776 415,748" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="485" y="752" text-anchor="middle" font-size="11" fill="#412402">Stock OK?</text>
<text x="563" y="742" font-size="11" fill="#854F0B" font-weight="600">No</text>
<path d="M555 748 L620 748 L620 545 L272 545" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="493" y="792" font-size="11" fill="#854F0B" font-weight="600">Yes</text>
<line x1="485" y1="776" x2="485" y2="810" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- System: Create Order (pending) -->
<rect x="380" y="810" width="210" height="40" rx="16" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
<text x="485" y="834" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Create order (pending)</text>
<line x1="485" y1="850" x2="485" y2="870" stroke="#555" stroke-width="1"/>
<path d="M485 870 L190 870 L190 895" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ===== PAYMENT (before any inventory decrement) ===== -->
<rect x="100" y="895" width="180" height="40" rx="16" fill="#F7C1C1" stroke="#A32D2D" stroke-width="0.8"/>
<text x="190" y="919" text-anchor="middle" font-size="13" font-weight="600" fill="#501313">Enter payment info</text>
<line x1="280" y1="915" x2="400" y2="915" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="400" y="895" width="180" height="40" rx="16" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.8"/>
<text x="490" y="919" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">Process payment</text>
<line x1="490" y1="935" x2="490" y2="963" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- D4: Payment success? -->
<polygon points="490,963 560,991 490,1019 420,991" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="490" y="995" text-anchor="middle" font-size="11" fill="#412402">Success?</text>

<!-- ===== PAYMENT FAIL → Release reservation + Cancel order → Back to cart ===== -->
<text x="568" y="985" font-size="11" fill="#A32D2D" font-weight="600">No</text>
<line x1="560" y1="991" x2="620" y2="991" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="530" y="1010" width="180" height="48" rx="16" fill="#F7C1C1" stroke="#A32D2D" stroke-width="0.8"/>
<text x="620" y="1030" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">Release reservation</text>
<text x="620" y="1046" text-anchor="middle" font-size="11" fill="#791F1F">+ Cancel order</text>
<path d="M620 1005 L620 1010" fill="none" stroke="#A32D2D" stroke-width="1"/>
<path d="M530 1034 L310 1034 L310 545 L272 545" fill="none" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ===== PAYMENT SUCCESS → Now decrement + clear cart ===== -->
<text x="498" y="1037" font-size="11" fill="#3B6D11" font-weight="600">Yes</text>
<line x1="490" y1="1019" x2="490" y2="1080" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>

<!-- FORK BAR -->
<rect x="385" y="1080" width="195" height="5" rx="2" fill="#333"/>
<line x1="430" y1="1085" x2="430" y2="1115" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="535" y1="1085" x2="535" y2="1115" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Parallel: Decrement inventory (ONLY after payment success) -->
<rect x="355" y="1115" width="150" height="40" rx="16" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.8"/>
<text x="430" y="1139" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">Decrement stock</text>

<!-- Parallel: Clear cart -->
<rect x="510" y="1115" width="110" height="40" rx="16" fill="#CECBF6" stroke="#534AB7" stroke-width="0.8"/>
<text x="565" y="1139" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Clear cart</text>

<!-- JOIN BAR -->
<line x1="430" y1="1155" x2="430" y2="1175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="565" y1="1155" x2="565" y2="1175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="385" y="1175" width="195" height="5" rx="2" fill="#333"/>
<line x1="490" y1="1180" x2="490" y2="1210" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- System: Update order to paid -->
<rect x="390" y="1210" width="200" height="40" rx="16" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.8"/>
<text x="490" y="1234" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">Update order to paid</text>
<line x1="490" y1="1250" x2="490" y2="1270" stroke="#555" stroke-width="1"/>
<path d="M490 1270 L190 1270 L190 1295" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- A9: View Order Status -->
<rect x="100" y="1295" width="180" height="40" rx="16" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
<text x="190" y="1319" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">View order status</text>
<line x1="190" y1="1335" x2="190" y2="1365" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- D5: Shop again? -->
<polygon points="190,1365 260,1393 190,1421 120,1393" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="190" y="1397" text-anchor="middle" font-size="11" fill="#412402">Shop again?</text>
<text x="268" y="1387" font-size="11" fill="#854F0B" font-weight="600">Yes</text>
<path d="M260 1393 L310 1393 L310 260 L282 260" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="198" y="1438" font-size="11" fill="#854F0B" font-weight="600">No</text>
<line x1="190" y1="1421" x2="190" y2="1460" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- UML FINAL NODE -->
<circle cx="190" cy="1474" r="12" fill="none" stroke="#333" stroke-width="2"/>
<circle cx="190" cy="1474" r="7" fill="#333"/>

<!-- LEGEND -->
<rect x="42" y="1498" width="280" height="72" fill="white" opacity="0.95" rx="6" stroke="#ccc" stroke-width="0.5"/>
<text x="50" y="1516" font-size="12" font-weight="600" fill="#333">UML Activity Diagram Notation</text>
<circle cx="56" cy="1532" r="5" fill="#333"/>
<text x="68" y="1536" font-size="10" fill="#555">Initial node</text>
<circle cx="136" cy="1532" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
<circle cx="136" cy="1532" r="3.5" fill="#333"/>
<text x="148" y="1536" font-size="10" fill="#555">Final node</text>
<rect x="220" y="1526" width="14" height="14" rx="7" fill="none" stroke="#555" stroke-width="0.5"/>
<text x="240" y="1537" font-size="10" fill="#555">Activity</text>
<polygon points="56,1548 62,1556 56,1564 50,1556" fill="none" stroke="#555" stroke-width="0.5"/>
<text x="70" y="1559" font-size="10" fill="#555">Decision</text>
<rect x="136" y="1550" width="18" height="4" rx="1" fill="#333"/>
<text x="160" y="1557" font-size="10" fill="#555">Fork / Join</text>
<line x1="220" y1="1554" x2="238" y2="1554" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3"/>
<text x="244" y="1558" font-size="10" fill="#555">Cross-lane</text>
</svg>
